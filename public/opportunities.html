<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse volunteering opportunities around Lucknow and sign up." />
  <title>Opportunities, GiveTime</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="brand">Give<span>Time</span></a>
      <div class="header__right">
        <nav class="nav" id="nav">
          <a href="index.html">Home</a>
          <a href="opportunities.html" class="active">Opportunities</a>
          <a href="about.html">About</a>
          <a href="post.html" class="nav__cta">Post an opportunity</a>
        </nav>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="nav"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main>
    <div class="page-head">
      <div class="container">
        <h1>Opportunities</h1>
        <p>Live from the database. Pick one and take a spot.</p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="toolbar">
          <input type="search" id="search" class="input" placeholder="Search by title, organisation or place" aria-label="Search" />
          <select id="causeFilter" class="select" aria-label="Filter by cause">
            <option value="all">All causes</option>
            <option>Environment</option>
            <option>Education</option>
            <option>Health</option>
            <option>Community</option>
            <option>Animal Welfare</option>
            <option>Women Empowerment</option>
            <option>Elderly Care</option>
            <option>Disaster Relief</option>
            <option>Hunger Relief</option>
            <option>Arts and Culture</option>
            <option>Sports and Youth</option>
            <option>Mental Health</option>
          </select>
        </div>

        <ul class="grid" id="skeleton" hidden>
          <li class="skeleton"></li><li class="skeleton"></li><li class="skeleton"></li>
        </ul>

        <div class="banner" id="errorBanner" hidden>
          <span id="errorText">Could not reach the server.</span>
          <button class="btn btn-outline btn-sm" id="retry">Retry</button>
        </div>

        <ul class="grid" id="grid" aria-live="polite"></ul>
        <p class="empty" id="empty" hidden>No opportunities match your search yet.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <span>GiveTime, Lucknow</span>
      <span class="small">&copy; <span id="year"></span> GiveTime</span>
    </div>
  </footer>

  <div class="toasts" id="toasts" aria-live="assertive"></div>

  <div class="overlay" id="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h3 id="confirmTitle">Delete this opportunity?</h3>
      <p class="muted" id="confirmText">This cannot be undone.</p>
      <div class="modal__foot">
        <button class="btn btn-outline" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/opportunities.js"></script>
</body>
</html>
